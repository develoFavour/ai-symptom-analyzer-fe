<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 560" fill="none">
  <defs>
    <!-- Radial glow behind figure -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <!-- Body gradient -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <!-- Panel glass gradient -->
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.04"/>
    </linearGradient>
    <!-- Orbit ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <!-- Heart glow filter -->
    <filter id="heartGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft node glow -->
    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Body glow filter -->
    <filter id="bodyGlow" x="-30%" y="-20%" width="160%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Background radial glow ── -->
  <ellipse cx="260" cy="290" rx="230" ry="230" fill="url(#glow)"/>

  <!-- ── Outer orbit rings ── -->
  <ellipse cx="260" cy="290" rx="200" ry="200" stroke="url(#ringGrad)" stroke-width="1" stroke-dasharray="6 8" opacity="0.5"/>
  <ellipse cx="260" cy="290" rx="160" ry="160" stroke="#06b6d4" stroke-width="0.8" stroke-dasharray="4 12" opacity="0.3"/>

  <!-- ── Connector lines from body to panels ── -->
  <line x1="200" y1="200" x2="85" y2="145" stroke="#06b6d4" stroke-width="0.8" stroke-dasharray="4 6" opacity="0.5"/>
  <line x1="320" y1="210" x2="430" y2="145" stroke="#06b6d4" stroke-width="0.8" stroke-dasharray="4 6" opacity="0.5"/>
  <line x1="185" y1="310" x2="60" y2="330" stroke="#06b6d4" stroke-width="0.8" stroke-dasharray="4 6" opacity="0.4"/>
  <line x1="335" y1="310" x2="460" y2="350" stroke="#06b6d4" stroke-width="0.8" stroke-dasharray="4 6" opacity="0.4"/>
  <line x1="260" y1="440" x2="260" y2="500" stroke="#06b6d4" stroke-width="0.8" stroke-dasharray="4 6" opacity="0.4"/>

  <!-- ── Neural network nodes ── -->
  <!-- top-left cluster -->
  <circle cx="130" cy="170" r="4" fill="#06b6d4" filter="url(#nodeGlow)" opacity="0.9"/>
  <circle cx="95"  cy="210" r="3" fill="#22d3ee" opacity="0.7"/>
  <circle cx="150" cy="215" r="2.5" fill="#06b6d4" opacity="0.6"/>
  <line x1="130" y1="170" x2="95"  y2="210" stroke="#06b6d4" stroke-width="0.7" opacity="0.4"/>
  <line x1="130" y1="170" x2="150" y2="215" stroke="#06b6d4" stroke-width="0.7" opacity="0.4"/>
  <line x1="95"  y1="210" x2="150" y2="215" stroke="#06b6d4" stroke-width="0.7" opacity="0.3"/>

  <!-- top-right cluster -->
  <circle cx="385" cy="165" r="4" fill="#06b6d4" filter="url(#nodeGlow)" opacity="0.9"/>
  <circle cx="420" cy="200" r="3" fill="#22d3ee" opacity="0.7"/>
  <circle cx="365" cy="210" r="2.5" fill="#06b6d4" opacity="0.6"/>
  <line x1="385" y1="165" x2="420" y2="200" stroke="#06b6d4" stroke-width="0.7" opacity="0.4"/>
  <line x1="385" y1="165" x2="365" y2="210" stroke="#06b6d4" stroke-width="0.7" opacity="0.4"/>
  <line x1="420" y1="200" x2="365" y2="210" stroke="#06b6d4" stroke-width="0.7" opacity="0.3"/>

  <!-- bottom nodes -->
  <circle cx="170" cy="410" r="3.5" fill="#06b6d4" filter="url(#nodeGlow)" opacity="0.8"/>
  <circle cx="350" cy="415" r="3.5" fill="#06b6d4" filter="url(#nodeGlow)" opacity="0.8"/>
  <circle cx="260" cy="480" r="3"   fill="#22d3ee" opacity="0.6"/>
  <line x1="170" y1="410" x2="260" y2="480" stroke="#06b6d4" stroke-width="0.7" opacity="0.3"/>
  <line x1="350" y1="415" x2="260" y2="480" stroke="#06b6d4" stroke-width="0.7" opacity="0.3"/>

  <!-- ── Glass panels ── -->
  <!-- Top-left panel: DNA / Analysis -->
  <rect x="22" y="110" width="130" height="75" rx="14" fill="url(#panelGrad)" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- DNA double-helix sketch -->
  <path d="M42 175 Q55 163 68 175 Q81 187 94 175 Q107 163 120 175" stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.8"/>
  <path d="M42 165 Q55 153 68 165 Q81 177 94 165 Q107 153 120 165" stroke="#06b6d4" stroke-width="1" fill="none" opacity="0.5"/>
  <text x="42" y="135" font-family="system-ui,sans-serif" font-size="8" fill="#a5f3fc" font-weight="600" letter-spacing="1" opacity="0.9">DNA ANALYSIS</text>
  <text x="42" y="148" font-family="system-ui,sans-serif" font-size="7" fill="#67e8f9" opacity="0.6">Genomic scan active</text>
  <!-- vertical rungs -->
  <line x1="55" y1="162" x2="55" y2="176" stroke="#06b6d4" stroke-width="0.8" opacity="0.4"/>
  <line x1="68" y1="156" x2="68" y2="170" stroke="#06b6d4" stroke-width="0.8" opacity="0.4"/>
  <line x1="81" y1="162" x2="81" y2="176" stroke="#06b6d4" stroke-width="0.8" opacity="0.4"/>
  <line x1="94" y1="156" x2="94" y2="170" stroke="#06b6d4" stroke-width="0.8" opacity="0.4"/>
  <line x1="107" y1="162" x2="107" y2="176" stroke="#06b6d4" stroke-width="0.8" opacity="0.4"/>

  <!-- Top-right panel: Risk Score -->
  <rect x="368" y="105" width="128" height="80" rx="14" fill="url(#panelGrad)" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="384" y="128" font-family="system-ui,sans-serif" font-size="8" fill="#a5f3fc" font-weight="600" letter-spacing="1" opacity="0.9">RISK SCORE</text>
  <!-- Bar chart -->
  <rect x="384" y="148" width="10" height="28" rx="3" fill="#06b6d4" opacity="0.3"/>
  <rect x="398" y="138" width="10" height="38" rx="3" fill="#06b6d4" opacity="0.5"/>
  <rect x="412" y="143" width="10" height="33" rx="3" fill="#06b6d4" opacity="0.4"/>
  <rect x="426" y="132" width="10" height="44" rx="3" fill="#22d3ee" opacity="0.7"/>
  <rect x="440" y="145" width="10" height="31" rx="3" fill="#06b6d4" opacity="0.4"/>
  <rect x="454" y="136" width="10" height="40" rx="3" fill="#06b6d4" opacity="0.5"/>
  <text x="384" y="142" font-family="system-ui,sans-serif" font-size="7" fill="#67e8f9" opacity="0.6">Severity: 78/100</text>

  <!-- Left-mid panel: Vitals -->
  <rect x="18" y="295" width="120" height="68" rx="12" fill="url(#panelGrad)" stroke="#0e7490" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="32" y="314" font-family="system-ui,sans-serif" font-size="8" fill="#a5f3fc" font-weight="600" letter-spacing="1" opacity="0.9">VITALS</text>
  <!-- heartbeat line -->
  <polyline points="28,345 42,345 50,326 58,360 66,326 74,345 82,345 90,330 98,345 120,345"
            stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.85" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="32" y="327" font-family="system-ui,sans-serif" font-size="7" fill="#67e8f9" opacity="0.6">BPM · 72 · Stable</text>

  <!-- Right-mid panel: Neural net -->
  <rect x="382" y="305" width="120" height="70" rx="12" fill="url(#panelGrad)" stroke="#0e7490" stroke-width="0.8" stroke-opacity="0.5"/>
  <text x="396" y="325" font-family="system-ui,sans-serif" font-size="8" fill="#a5f3fc" font-weight="600" letter-spacing="1" opacity="0.9">NEURAL MAP</text>
  <!-- mini neural net -->
  <circle cx="402" cy="348" r="4" fill="#06b6d4" opacity="0.7"/>
  <circle cx="402" cy="365" r="4" fill="#06b6d4" opacity="0.7"/>
  <circle cx="425" cy="340" r="4" fill="#22d3ee" opacity="0.8"/>
  <circle cx="425" cy="357" r="4" fill="#22d3ee" opacity="0.8"/>
  <circle cx="425" cy="373" r="4" fill="#22d3ee" opacity="0.6"/>
  <circle cx="450" cy="348" r="4" fill="#06b6d4" opacity="0.7"/>
  <circle cx="450" cy="365" r="4" fill="#06b6d4" opacity="0.7"/>
  <circle cx="474" cy="357" r="5" fill="#22d3ee" filter="url(#nodeGlow)" opacity="0.9"/>
  <line x1="406" y1="348" x2="421" y2="340" stroke="#06b6d4" stroke-width="0.7" opacity="0.5"/>
  <line x1="406" y1="348" x2="421" y2="357" stroke="#06b6d4" stroke-width="0.7" opacity="0.5"/>
  <line x1="406" y1="348" x2="421" y2="373" stroke="#06b6d4" stroke-width="0.7" opacity="0.4"/>
  <line x1="406" y1="365" x2="421" y2="340" stroke="#06b6d4" stroke-width="0.7" opacity="0.3"/>
  <line x1="406" y1="365" x2="421" y2="357" stroke="#06b6d4" stroke-width="0.7" opacity="0.5"/>
  <line x1="406" y1="365" x2="421" y2="373" stroke="#06b6d4" stroke-width="0.7" opacity="0.5"/>
  <line x1="429" y1="340" x2="446" y2="348" stroke="#06b6d4" stroke-width="0.7" opacity="0.5"/>
  <line x1="429" y1="357" x2="446" y2="348" stroke="#06b6d4" stroke-width="0.7" opacity="0.5"/>
  <line x1="429" y1="357" x2="446" y2="365" stroke="#06b6d4" stroke-width="0.7" opacity="0.5"/>
  <line x1="429" y1="373" x2="446" y2="365" stroke="#06b6d4" stroke-width="0.7" opacity="0.5"/>
  <line x1="454" y1="348" x2="469" y2="357" stroke="#06b6d4" stroke-width="0.7" opacity="0.6"/>
  <line x1="454" y1="365" x2="469" y2="357" stroke="#06b6d4" stroke-width="0.7" opacity="0.6"/>

  <!-- Bottom panel: Diagnosis -->
  <rect x="165" y="490" width="190" height="52" rx="14" fill="url(#panelGrad)" stroke="#06b6d4" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="185" y="512" font-family="system-ui,sans-serif" font-size="8" fill="#a5f3fc" font-weight="600" letter-spacing="1" opacity="0.9">DIAGNOSIS READY</text>
  <rect x="185" y="520" width="130" height="4" rx="2" fill="#06b6d4" opacity="0.15"/>
  <rect x="185" y="520" width="102" height="4" rx="2" fill="#22d3ee" opacity="0.7"/>
  <text x="320" y="524" font-family="system-ui,sans-serif" font-size="7" fill="#67e8f9" opacity="0.7">78%</text>

  <!-- ── Human figure ── -->
  <!-- Body glow aura -->
  <ellipse cx="260" cy="290" rx="55" ry="110" fill="#06b6d4" opacity="0.06" filter="url(#bodyGlow)"/>

  <!-- Legs -->
  <rect x="238" y="390" width="18" height="70" rx="9" fill="url(#bodyGrad)" opacity="0.5"/>
  <rect x="264" y="390" width="18" height="70" rx="9" fill="url(#bodyGrad)" opacity="0.5"/>

  <!-- Torso -->
  <rect x="226" y="255" width="68" height="145" rx="22" fill="url(#bodyGrad)" opacity="0.55"/>
  <!-- Torso inner glow lines -->
  <line x1="244" y1="270" x2="244" y2="390" stroke="#a5f3fc" stroke-width="0.6" opacity="0.3"/>
  <line x1="276" y1="270" x2="276" y2="390" stroke="#a5f3fc" stroke-width="0.6" opacity="0.3"/>

  <!-- Arms -->
  <rect x="196" y="260" width="34" height="16" rx="8" fill="url(#bodyGrad)" opacity="0.5" transform="rotate(25 213 268)"/>
  <rect x="194" y="285" width="28" height="13" rx="6.5" fill="url(#bodyGrad)" opacity="0.4" transform="rotate(15 208 291)"/>
  <rect x="290" y="260" width="34" height="16" rx="8" fill="url(#bodyGrad)" opacity="0.5" transform="rotate(-25 307 268)"/>
  <rect x="298" y="285" width="28" height="13" rx="6.5" fill="url(#bodyGrad)" opacity="0.4" transform="rotate(-15 312 291)"/>

  <!-- Neck -->
  <rect x="250" y="238" width="20" height="22" rx="10" fill="url(#bodyGrad)" opacity="0.55"/>

  <!-- Head -->
  <ellipse cx="260" cy="218" rx="34" ry="38" fill="url(#bodyGrad)" opacity="0.6"/>
  <!-- Face highlight -->
  <ellipse cx="260" cy="210" rx="16" ry="18" fill="#a5f3fc" opacity="0.1"/>
  <!-- Eyes -->
  <ellipse cx="250" cy="215" rx="4" ry="3" fill="#0e7490" opacity="0.8"/>
  <ellipse cx="270" cy="215" rx="4" ry="3" fill="#0e7490" opacity="0.8"/>
  <circle cx="251" cy="215" r="2" fill="#22d3ee" opacity="0.9" filter="url(#nodeGlow)"/>
  <circle cx="271" cy="215" r="2" fill="#22d3ee" opacity="0.9" filter="url(#nodeGlow)"/>

  <!-- ── Heart pulse on chest ── -->
  <circle cx="260" cy="305" r="20" fill="#06b6d4" opacity="0.12" filter="url(#heartGlow)"/>
  <circle cx="260" cy="305" r="13" stroke="#22d3ee" stroke-width="1.2" fill="none" opacity="0.6"/>
  <!-- Heart icon -->
  <path d="M260 314 C248 306 242 297 248 291 C251 287 256 288 260 292 C264 288 269 287 272 291 C278 297 272 306 260 314 Z"
        fill="#22d3ee" filter="url(#heartGlow)" opacity="0.95"/>
  <!-- EKG line through torso -->
  <polyline points="228,320 237,320 241,310 247,328 253,310 259,320 269,320 273,314 277,320 292,320"
            stroke="#22d3ee" stroke-width="1.2" fill="none" opacity="0.65" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Body edge highlight -->
  <rect x="226" y="255" width="68" height="145" rx="22" fill="none" stroke="#a5f3fc" stroke-width="0.8" stroke-opacity="0.25"/>
  <ellipse cx="260" cy="218" rx="34" ry="38" fill="none" stroke="#a5f3fc" stroke-width="0.8" stroke-opacity="0.2"/>

  <!-- ── Floating data dots (ambient) ── -->
  <circle cx="175" cy="155" r="2" fill="#22d3ee" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="345" cy="160" r="2" fill="#22d3ee" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="155" cy="360" r="2" fill="#22d3ee" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="365" cy="370" r="2" fill="#22d3ee" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3.5s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="260" cy="108" r="2.5" fill="#06b6d4" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Heart pulse animation ring -->
  <circle cx="260" cy="305" r="18" stroke="#22d3ee" stroke-width="1" fill="none" opacity="0">
    <animate attributeName="r" values="18;32;18" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
